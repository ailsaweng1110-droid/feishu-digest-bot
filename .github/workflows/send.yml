  name: Send to Feishu                                                                                          
  "on":           
    repository_dispatch:
      types: [send_digest]
                                                                                                                
  jobs:
    send:                                                                                                       
      runs-on: ubuntu-latest
      steps:
        - name: Send digest to Feishu
          env:
            DIGEST: ${{ github.event.client_payload.digest }}
          run: |
            PAYLOAD=$(jq -n --arg text "$DIGEST" '{"msg_type":"text","content":{"text":$text}}')
            curl -s -X POST \                                                                                   
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \                                                                                   
              "https://open.feishu.cn/open-apis/bot/v2/hook/ba66eab5-cc20-42ec-ae80-2f0ab24866a8"
